services:
  proxy:
    image: claude-codex-proxy:local
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    environment:
      # 容器内必须监听 0.0.0.0，宿主机再用 127.0.0.1 做安全绑定。
      CLAUDE_CODE_PROXY_LISTEN_ADDR: ${CLAUDE_CODE_PROXY_LISTEN_ADDR:-0.0.0.0:8787}

      # 本地 Docker 默认走 --env-file .env.local 或 shell 环境变量，不依赖挂载 ~/.codex 或 ~/.claude。
      CLAUDE_CODE_PROXY_BACKEND_BASE_URL: ${CLAUDE_CODE_PROXY_BACKEND_BASE_URL:?set via --env-file .env.local or shell}
      CLAUDE_CODE_PROXY_BACKEND_API_KEY: ${CLAUDE_CODE_PROXY_BACKEND_API_KEY:?set via --env-file .env.local or shell}
      CLAUDE_CODE_PROXY_CLIENT_API_KEY: ${CLAUDE_CODE_PROXY_CLIENT_API_KEY:?set via --env-file .env.local or shell}

      # 常用可选项。
      CLAUDE_CODE_PROXY_BACKEND_MODEL: ${CLAUDE_CODE_PROXY_BACKEND_MODEL:-}
      CLAUDE_CODE_PROXY_BACKEND_PATH: ${CLAUDE_CODE_PROXY_BACKEND_PATH:-}
      CLAUDE_CODE_PROXY_REQUEST_TIMEOUT: ${CLAUDE_CODE_PROXY_REQUEST_TIMEOUT:-}
      CLAUDE_CODE_PROXY_ANTHROPIC_MODEL_ALIAS: ${CLAUDE_CODE_PROXY_ANTHROPIC_MODEL_ALIAS:-}
      CLAUDE_CODE_PROXY_BACKEND_REASONING_EFFORT: ${CLAUDE_CODE_PROXY_BACKEND_REASONING_EFFORT:-}
      CLAUDE_CODE_PROXY_ANTHROPIC_API_KEY: ${CLAUDE_CODE_PROXY_ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_PROXY_ANTHROPIC_API_BASE_URL: ${CLAUDE_CODE_PROXY_ANTHROPIC_API_BASE_URL:-}
      CLAUDE_CODE_PROXY_ENABLE_BACKEND_METADATA: ${CLAUDE_CODE_PROXY_ENABLE_BACKEND_METADATA:-}
      CLAUDE_CODE_PROXY_FORWARD_USER_METADATA: ${CLAUDE_CODE_PROXY_FORWARD_USER_METADATA:-}
      CLAUDE_CODE_PROXY_USER_METADATA_ALLOWLIST: ${CLAUDE_CODE_PROXY_USER_METADATA_ALLOWLIST:-}
      CLAUDE_CODE_PROXY_DISABLE_CONTINUITY_METADATA: ${CLAUDE_CODE_PROXY_DISABLE_CONTINUITY_METADATA:-}
      CLAUDE_CODE_PROXY_DISABLE_PROMPT_CACHE_KEY: ${CLAUDE_CODE_PROXY_DISABLE_PROMPT_CACHE_KEY:-}
      CLAUDE_CODE_PROXY_ANONYMOUS_MODE: ${CLAUDE_CODE_PROXY_ANONYMOUS_MODE:-}
      CLAUDE_CODE_PROXY_ENABLE_PHASE_COMMENTARY: ${CLAUDE_CODE_PROXY_ENABLE_PHASE_COMMENTARY:-}
      CLAUDE_CODE_PROXY_DISABLE_BACKEND_STREAMING: ${CLAUDE_CODE_PROXY_DISABLE_BACKEND_STREAMING:-}
      CLAUDE_CODE_PROXY_DEBUG: ${CLAUDE_CODE_PROXY_DEBUG:-}

    ports:
      - "127.0.0.1:8787:8787"

    # 本地自用默认最小权限：不挂源码、不挂 home、只读根文件系统。
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
